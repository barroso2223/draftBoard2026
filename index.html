<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>2026 NFL Draft Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 style="display: flex; align-items: center; gap: 10px">
      <img
        src="https://upload.wikimedia.org/wikipedia/en/thumb/a/a2/National_Football_League_logo.svg/200px-National_Football_League_logo.svg.png"
        alt="NFL Logo"
        style="height: 40px; width: auto"
      />
      <span>2026 NFL Draft Tracker</span>
    </h1>

    <!-- Draft Picks section -->
    <h2 id="draftBoardHeading">Draft Picks</h2>
    <div id="draftBoard"></div>

    <!-- Top 25 section (grouped with dropdown) -->
    <h2 id="top25Heading">Top 25 Undrafted Players left on the Board</h2>
    <div id="top25Section">
      <select id="positionSelect">
        <option value="ALL">All Positions</option>
        <option value="QB">QB</option>
        <option value="RB">RB</option>
        <option value="WR">WR</option>
        <option value="TE">TE</option>
        <option value="OT">OT</option>
        <option value="IOL">IOL</option>
        <option value="EDGE">EDGE</option>
        <option value="DT">DT</option>
        <option value="LB">LB</option>
        <option value="CB">CB</option>
        <option value="S">S</option>
      </select>
      <div id="top25List"></div>
    </div>

    <!-- Team Grades section -->
    <h2 id="teamGradesHeading">Team Grades</h2>
    <div id="teamGrades"></div>

    <div id="onClock"></div>

    <!-- Modal (unchanged) -->
    <div id="bioModal" class="modal" style="display: none">
      <div class="modal-content">
        <div class="modal-disclaimer">
          ⚠️ Bio is automatically loaded from Wikipedia using the player’s name.
          For common names, the page shown may be incorrect. Use Wikipedia
          search if needed.
        </div>
        <button class="modal-close" aria-label="Close">&times;</button>
        <div class="iframe-wrapper">
          <iframe
            id="bioIframe"
            title="Player Bio"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-top-navigation"
          ></iframe>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
