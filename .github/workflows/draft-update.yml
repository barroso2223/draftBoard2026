name: Live Draft Update

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Fetch picks from Yahoo Sports
        run: node scripts/fetch-picks.cjs

      - name: Apply picks to players.json
        run: node scripts/apply-picks.cjs

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Auto draft update $(date +'%H:%M')"
          git push